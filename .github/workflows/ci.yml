name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      PY_COLORS: "0"
      NO_COLOR: "1"

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show versions
        run: |
          python --version
          pip --version
          ruff --version
          mypy --version
          pytest --version
          python -c "import coverage, sys; print('coverage', coverage.__version__)"

      - name: Ruff format (check only)
        run: ruff format --check src

      - name: Ruff lint
        run: ruff check src

      - name: Mypy (type-check)
        run: mypy src

      - name: Tests + Coverage
        run: |
          coverage erase
          coverage run -m pytest -q
          coverage report -m
          coverage xml

      - name: QA Resource Allocation (testmon)
        run: |
          set -euo pipefail
          rm -f .testmondata
          python testmon_metrics/compute_qa_resource_allocation.py --source src --tests tests --rebuild-baseline --output reports/qa_resource_allocation.json
          echo "---- metric report ----"
          cat reports/qa_resource_allocation.json

      - name: Upload QA Resource Allocation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-resource-allocation
          path: reports/qa_resource_allocation.json
          if-no-files-found: warn

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml